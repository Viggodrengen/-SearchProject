global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: search-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - searchapi1:8080
          - searchapi2:8080

  - job_name: search-load-balancer
    metrics_path: /metrics
    static_configs:
      - targets:
          - searchloadbalancer:8080
