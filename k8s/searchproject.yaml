apiVersion: v1
kind: Namespace
metadata:
  name: searchproject
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: searchproject
data:
  001_schema_and_seed.sql: |
    CREATE TABLE IF NOT EXISTS document (
      id INTEGER PRIMARY KEY,
      url TEXT,
      idxTime TIMESTAMP,
      creationTime TIMESTAMP
    );
    CREATE TABLE IF NOT EXISTS word (
      id INTEGER PRIMARY KEY,
      name TEXT
    );
    CREATE TABLE IF NOT EXISTS occ (
      wordId INTEGER,
      docId INTEGER,
      FOREIGN KEY (wordId) REFERENCES word(id),
      FOREIGN KEY (docId) REFERENCES document(id)
    );
    CREATE INDEX IF NOT EXISTS word_index ON occ (wordId);
    CREATE INDEX IF NOT EXISTS doc_index ON occ (docId);
    TRUNCATE TABLE occ, word, document RESTART IDENTITY CASCADE;
    INSERT INTO document (id, url, idxTime, creationTime) VALUES
      (1, '/docs/mail-1.txt', NOW(), NOW()),
      (2, '/docs/mail-2.txt', NOW(), NOW()),
      (3, '/docs/report-1.txt', NOW(), NOW()),
      (4, '/docs/report-2.txt', NOW(), NOW());
    INSERT INTO word (id, name) VALUES
      (1, 'SoCal'), (2, 'socal'), (3, 'energy'), (4, 'market'),
      (5, 'Search'), (6, 'search'), (7, 'pipeline');
    INSERT INTO occ (wordId, docId) VALUES
      (1, 1), (3, 1), (4, 1), (2, 2), (3, 2), (5, 3), (6, 4), (7, 4);
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: searchproject
data:
  default.conf: |
    upstream search_api_backend {
      server search-api.searchproject.svc.cluster.local:8080;
    }
    server {
      listen 8080;
      location /api/ {
        proxy_pass http://search_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        add_header X-LB-Strategy "kubernetes-service" always;
        add_header X-LB-Backend $upstream_addr always;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: searchproject
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - { name: POSTGRES_DB, value: searchdb }
            - { name: POSTGRES_USER, value: search }
            - { name: POSTGRES_PASSWORD, value: search }
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "search", "-d", "searchdb"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: postgres-init
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: searchproject
spec:
  selector: { app: postgres }
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: searchproject
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: searchproject
spec:
  selector: { app: redis }
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-api
  namespace: searchproject
spec:
  replicas: 2
  selector:
    matchLabels: { app: search-api }
  template:
    metadata:
      labels: { app: search-api }
    spec:
      containers:
        - name: search-api
          image: search-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: SEARCH_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SEARCH_POSTGRES_CONNECTION
              value: Host=postgres;Port=5432;Username=search;Password=search;Database=searchdb
            - name: REDIS_CONNECTION_STRING
              value: redis:6379
            - name: SearchCache__Enabled
              value: "true"
            - name: SearchCache__TtlSeconds
              value: "300"
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 8
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: search-api
  namespace: searchproject
  labels:
    app: search-api
spec:
  selector: { app: search-api }
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: searchproject
spec:
  replicas: 1
  selector:
    matchLabels: { app: nginx }
  template:
    metadata:
      labels: { app: nginx }
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: searchproject
spec:
  type: NodePort
  selector: { app: nginx }
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-webapp
  namespace: searchproject
spec:
  replicas: 1
  selector:
    matchLabels: { app: search-webapp }
  template:
    metadata:
      labels: { app: search-webapp }
    spec:
      containers:
        - name: search-webapp
          image: search-webapp:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - { name: ASPNETCORE_ENVIRONMENT, value: Production }
            - { name: SearchApi__BaseUrl, value: http://nginx:8080 }
            - { name: UseHttpsRedirection, value: "false" }
---
apiVersion: v1
kind: Service
metadata:
  name: search-webapp
  namespace: searchproject
spec:
  type: NodePort
  selector: { app: search-webapp }
  ports:
    - name: http
      port: 8080
      targetPort: 8080
