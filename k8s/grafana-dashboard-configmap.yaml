apiVersion: v1
kind: ConfigMap
metadata:
  name: searchproject-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  searchproject-dashboard.json: |
    {
      "uid": "searchproject-walking-skeleton",
      "title": "SearchProject Walking Skeleton - Demo Dashboard",
      "schemaVersion": 39,
      "version": 9,
      "refresh": "5s",
      "time": { "from": "now-10m", "to": "now" },
      "panels": [
        {
          "id": 100,
          "title": "Sådan kan dashboardet tolkes",
          "type": "text",
          "gridPos": { "h": 3, "w": 24, "x": 0, "y": 0 },
          "options": {
            "mode": "markdown",
            "content": "**Læs dashboardet som tre driftsspørgsmål:** 1) Bliver søgningerne ved med at lykkes? 2) Bliver Postgres mindre presset, når Redis-cache virker? 3) Flytter API-pressure sig fra én pod til flere pods, når vi skalerer SearchApi op?"
          }
        },
        {
          "id": 101,
          "title": "API pods kørende",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 3 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short", "thresholds": { "mode": "absolute", "steps": [ { "color": "red", "value": null }, { "color": "orange", "value": 1 }, { "color": "green", "value": 2 } ] } }, "overrides": [] },
          "options": { "colorMode": "value", "graphMode": "none", "justifyMode": "center", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [ { "refId": "A", "expr": "max(kube_deployment_status_replicas_available{namespace=\"searchproject\",deployment=\"search-api\"})", "legendFormat": "api pods" } ]
        },
        {
          "id": 102,
          "title": "Redis pods kørende",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 3 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short", "thresholds": { "mode": "absolute", "steps": [ { "color": "red", "value": null }, { "color": "green", "value": 1 } ] } }, "overrides": [] },
          "options": { "colorMode": "value", "graphMode": "none", "justifyMode": "center", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [ { "refId": "A", "expr": "max(kube_deployment_status_replicas_available{namespace=\"searchproject\",deployment=\"redis\"})", "legendFormat": "redis pods" } ]
        },
        {
          "id": 103,
          "title": "Postgres pods kørende",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 3 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short", "thresholds": { "mode": "absolute", "steps": [ { "color": "red", "value": null }, { "color": "green", "value": 1 } ] } }, "overrides": [] },
          "options": { "colorMode": "value", "graphMode": "none", "justifyMode": "center", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [ { "refId": "A", "expr": "max(kube_deployment_status_replicas_available{namespace=\"searchproject\",deployment=\"postgres\"})", "legendFormat": "postgres pods" } ]
        },
        {
          "id": 104,
          "title": "Søgninger / sek",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 3 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "options": { "colorMode": "value", "graphMode": "none", "justifyMode": "center", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [ { "refId": "A", "expr": "sum(rate(http_server_request_duration_seconds_count{job=\"search-api\",http_route=\"/api/search\"}[30s]))", "legendFormat": "search req/s" } ]
        },
        {
          "id": 105,
          "title": "Postgres CPU pressure",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 3 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "percent", "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "orange", "value": 25 }, { "color": "red", "value": 60 } ] } }, "overrides": [] },
          "options": { "colorMode": "value", "graphMode": "none", "justifyMode": "center", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [ { "refId": "A", "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"searchproject\",pod=~\"postgres.*\"}[1m])) * 100", "legendFormat": "postgres cpu" } ]
        },
        {
          "id": 106,
          "title": "Health: succesrate",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 3 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1, "thresholds": { "mode": "absolute", "steps": [ { "color": "red", "value": null }, { "color": "orange", "value": 0.95 }, { "color": "green", "value": 0.99 } ] } }, "overrides": [] },
          "options": { "colorMode": "value", "graphMode": "none", "justifyMode": "center", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [ { "refId": "A", "expr": "sum(rate(http_server_request_duration_seconds_count{job=\"search-api\",http_route=\"/api/search\",http_response_status_code=\"200\"}[30s])) / sum(rate(http_server_request_duration_seconds_count{job=\"search-api\",http_route=\"/api/search\"}[30s]))", "legendFormat": "success" } ]
        },
        {
          "id": 8,
          "title": "API pressure lige nu: request rate pr. pod",
          "type": "bargauge",
          "gridPos": { "h": 7, "w": 8, "x": 0, "y": 7 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "reqps", "min": 0, "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "orange", "value": 25 }, { "color": "red", "value": 60 } ] } }, "overrides": [] },
          "options": { "displayMode": "gradient", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "orientation": "horizontal", "showUnfilled": true },
          "targets": [ { "refId": "A", "expr": "sum by (pod) (rate(http_server_request_duration_seconds_count{job=\"search-api\",http_route=\"/api/search\"}[30s]))", "legendFormat": "{{pod}}" } ]
        },
        {
          "id": 9,
          "title": "API compute lige nu: CPU pressure pr. pod",
          "type": "bargauge",
          "gridPos": { "h": 7, "w": 8, "x": 8, "y": 7 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "orange", "value": 25 }, { "color": "red", "value": 60 } ] } }, "overrides": [] },
          "options": { "displayMode": "gradient", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "orientation": "horizontal", "showUnfilled": true },
          "targets": [ { "refId": "A", "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"searchproject\",pod=~\"search-api.*\"}[1m])) * 100", "legendFormat": "{{pod}}" } ]
        },
        {
          "id": 10,
          "title": "Aktuel søgetid (hit=Redis, miss=Postgres, fallback=Redis→Postgres)",
          "type": "bargauge",
          "gridPos": { "h": 7, "w": 8, "x": 16, "y": 7 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "ms", "min": 0, "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "orange", "value": 500 }, { "color": "red", "value": 2000 } ] } }, "overrides": [] },
          "options": { "displayMode": "gradient", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "orientation": "horizontal", "showUnfilled": true },
          "targets": [ { "refId": "A", "expr": "max by (cache_status) (search_duration_latest_milliseconds{job=\"search-api\"})", "legendFormat": "{{cache_status}}" } ]
        },
        {
          "id": 2,
          "title": "Søgetid over tid: hit vs miss/fallback",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 14 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "ms" }, "overrides": [] },
          "targets": [ { "refId": "A", "expr": "max by (cache_status) (search_duration_latest_milliseconds{job=\"search-api\"})", "legendFormat": "{{cache_status}} latest" } ]
        },
        {
          "id": 5,
          "title": "Postgres compute over tid: CPU pressure",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 14 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "percent" }, "overrides": [] },
          "targets": [ { "refId": "A", "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"searchproject\",pod=~\"postgres.*\"}[1m])) * 100", "legendFormat": "postgres cpu" } ]
        },
        {
          "id": 4,
          "title": "Cache-status lige nu: hit / miss / fallback",
          "type": "bargauge",
          "gridPos": { "h": 7, "w": 8, "x": 0, "y": 21 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "reqps", "min": 0 }, "overrides": [] },
          "options": { "displayMode": "gradient", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "orientation": "horizontal", "showUnfilled": true },
          "targets": [ { "refId": "A", "expr": "sum by (cache_status) (rate(search_cache_requests_total{job=\"search-api\"}[30s]))", "legendFormat": "{{cache_status}}" } ]
        },
        {
          "id": 3,
          "title": "Search traffic: status codes",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 16, "x": 8, "y": 21 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "targets": [ { "refId": "A", "expr": "sum by (http_response_status_code) (rate(http_server_request_duration_seconds_count{job=\"search-api\",http_route=\"/api/search\"}[30s]))", "legendFormat": "HTTP {{http_response_status_code}}" } ]
        },
        {
          "id": 11,
          "title": "Minikube pod-status lige nu",
          "type": "table",
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 28 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [ { "refId": "A", "expr": "kube_pod_status_phase{namespace=\"searchproject\",phase=\"Running\"} == 1", "format": "table", "instant": true } ]
        },
        {
          "id": 12,
          "title": "Pod restarts siden startup",
          "type": "table",
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 28 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [ { "refId": "A", "expr": "sum by (pod, container) (kube_pod_container_status_restarts_total{namespace=\"searchproject\",container=~\"search-api|redis|postgres|nginx|search-webapp\"})", "format": "table", "instant": true } ]
        }
      ]
    }
