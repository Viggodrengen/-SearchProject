apiVersion: v1
kind: ConfigMap
metadata:
  name: searchproject-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  searchproject-dashboard.json: |
    {
      "uid": "searchproject-walking-skeleton",
      "title": "SearchProject Walking Skeleton - Demo Dashboard",
      "schemaVersion": 39,
      "version": 5,
      "refresh": "5s",
      "time": { "from": "now-15m", "to": "now" },
      "panels": [
        {
          "id": 100,
          "title": "Sådan læses demoen",
          "type": "text",
          "gridPos": { "h": 3, "w": 24, "x": 0, "y": 0 },
          "options": {
            "mode": "markdown",
            "content": "**Storytelling:** Terminalen viser hvilken fase der kører. Dashboardet viser fire beviser: **1) Health:** rigtige søgninger svarer HTTP 200. **2) Cache:** hit aflaster databasen; miss/fallback rammer Postgres. **3) Redis-fejl:** Redis falder til 0, men søgninger fortsætter. **4) API-skalering:** flere API-pods deler trafikken under load."
          }
        },
        {
          "id": 1,
          "title": "1) Health check - successful searches",
          "type": "stat",
          "gridPos": { "h": 7, "w": 6, "x": 0, "y": 3 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1, "thresholds": { "mode": "absolute", "steps": [ { "color": "red", "value": null }, { "color": "orange", "value": 0.95 }, { "color": "green", "value": 0.99 } ] } }, "overrides": [] },
          "targets": [
            { "refId": "A", "expr": "sum(rate(http_server_request_duration_seconds_count{job=\"search-api\",http_route=\"/api/search\",http_response_status_code=\"200\"}[1m])) / sum(rate(http_server_request_duration_seconds_count{job=\"search-api\",http_route=\"/api/search\"}[1m]))", "legendFormat": "success ratio" }
          ]
        },
        {
          "id": 2,
          "title": "2) Search traffic - status codes",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 9, "x": 6, "y": 3 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "targets": [
            { "refId": "A", "expr": "sum by (http_response_status_code) (rate(http_server_request_duration_seconds_count{job=\"search-api\",http_route=\"/api/search\"}[1m]))", "legendFormat": "HTTP {{http_response_status_code}}" }
          ]
        },
        {
          "id": 3,
          "title": "3) API latency - hvad brugeren mærker",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 9, "x": 15, "y": 3 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] },
          "targets": [
            { "refId": "A", "expr": "histogram_quantile(0.95, sum by (le) (rate(http_server_request_duration_seconds_bucket{job=\"search-api\",http_route=\"/api/search\"}[1m])))", "legendFormat": "p95" }
          ]
        },
        {
          "id": 4,
          "title": "4) Cache decisions - hit / miss / fallback",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 10 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "targets": [
            { "refId": "A", "expr": "sum by (cache_status) (rate(search_cache_requests_total{job=\"search-api\"}[1m]))", "legendFormat": "{{cache_status}}" }
          ]
        },
        {
          "id": 5,
          "title": "5) Database pressure - requests der når Postgres",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 10 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "targets": [
            { "refId": "A", "expr": "sum by (reason) (rate(search_database_requests_total{job=\"search-api\"}[1m]))", "legendFormat": "{{reason}}" }
          ]
        },
        {
          "id": 6,
          "title": "6) Search duration - hit vs miss/fallback",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 17 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "ms" }, "overrides": [] },
          "targets": [
            { "refId": "A", "expr": "sum by (cache_status) (rate(search_duration_milliseconds_sum{job=\"search-api\"}[1m])) / sum by (cache_status) (rate(search_duration_milliseconds_count{job=\"search-api\"}[1m]))", "legendFormat": "{{cache_status}} avg" }
          ]
        },
        {
          "id": 7,
          "title": "7) Redis availability - falder under Redis-fejl",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 17 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [
            { "refId": "A", "expr": "kube_deployment_status_replicas_available{namespace=\"searchproject\",deployment=\"redis\"}", "legendFormat": "redis available" },
            { "refId": "B", "expr": "kube_deployment_spec_replicas{namespace=\"searchproject\",deployment=\"redis\"}", "legendFormat": "redis desired" }
          ]
        },
        {
          "id": 8,
          "title": "8) SearchApi replicas - desired vs available",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [
            { "refId": "A", "expr": "kube_deployment_spec_replicas{namespace=\"searchproject\",deployment=\"search-api\"}", "legendFormat": "desired" },
            { "refId": "B", "expr": "kube_deployment_status_replicas_available{namespace=\"searchproject\",deployment=\"search-api\"}", "legendFormat": "available" }
          ]
        },
        {
          "id": 9,
          "title": "9) Load per API pod - trafik fordeles ved scale-up",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "targets": [
            { "refId": "A", "expr": "sum by (pod) (rate(http_server_request_duration_seconds_count{job=\"search-api\",http_route=\"/api/search\"}[1m]))", "legendFormat": "{{pod}}" }
          ]
        },
        {
          "id": 10,
          "title": "Cache hit ratio",
          "type": "stat",
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 31 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "percentunit" }, "overrides": [] },
          "targets": [
            { "refId": "A", "expr": "sum(rate(search_cache_requests_total{job=\"search-api\",cache_status=\"hit\"}[5m])) / sum(rate(search_cache_requests_total{job=\"search-api\",cache_status=~\"hit|miss|fallback\"}[5m]))", "legendFormat": "hit ratio" }
          ]
        },
        {
          "id": 11,
          "title": "Current API pods scraped",
          "type": "stat",
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 31 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "refId": "A", "expr": "count(up{job=\"search-api\"} == 1)", "legendFormat": "scraped pods" }
          ]
        },
        {
          "id": 12,
          "title": "Redis up now",
          "type": "stat",
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 31 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "refId": "A", "expr": "kube_deployment_status_replicas_available{namespace=\"searchproject\",deployment=\"redis\"}", "legendFormat": "redis available" }
          ]
        }
      ]
    }
