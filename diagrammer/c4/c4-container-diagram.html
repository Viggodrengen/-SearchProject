<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>C4 Containerdiagram - SearchProject</title>
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="10" fill="%23172033"/><rect x="12" y="14" width="40" height="13" rx="3" fill="%23438dd5"/><rect x="12" y="34" width="18" height="16" rx="3" fill="%232d8c7b"/><rect x="36" y="34" width="16" height="16" rx="3" fill="%23f6c85f"/></svg>'>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #5d6678;
      --line: #2f3746;
      --border: #d9dee8;
      --system: #eef2f7;
      --person: #08427b;
      --container: #438dd5;
      --container-stroke: #2f72af;
      --data: #2d8c7b;
      --cache: #f6c85f;
      --ops: #657184;
      --shadow: 0 18px 45px rgba(23, 32, 51, 0.10);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
    }

    .page {
      width: min(1280px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    header {
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(26px, 3vw, 40px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      max-width: 780px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .diagram-shell {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: auto;
    }

    svg {
      display: block;
      width: 100%;
      min-width: 980px;
      height: auto;
      background: #fff;
    }

    .system-boundary {
      fill: #fff;
      stroke: #2f3746;
      stroke-width: 1.5;
      rx: 18;
      ry: 18;
    }

    .boundary-title {
      fill: #313a4c;
      font-size: 14px;
      font-weight: 700;
    }

    .node-rect {
      stroke-width: 2;
      rx: 8;
      ry: 8;
      filter: drop-shadow(0 8px 14px rgba(23, 32, 51, 0.11));
    }

    .person .node-rect {
      fill: var(--person);
      stroke: #073763;
    }

    .person-head,
    .person-body {
      fill: var(--person);
      stroke: #073763;
      stroke-width: 2;
      filter: drop-shadow(0 8px 14px rgba(23, 32, 51, 0.11));
    }

    .container .node-rect {
      fill: var(--container);
      stroke: var(--container-stroke);
    }

    .database .node-rect {
      fill: var(--data);
      stroke: #1d5e53;
    }

    .cache .node-rect {
      fill: var(--cache);
      stroke: #9b6500;
      stroke-dasharray: 8 5;
    }

    .ops .node-rect {
      fill: var(--ops);
      stroke: #4b5563;
    }

    .node-title,
    .node-kind,
    .node-desc {
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }

    .node-title {
      font-size: 15px;
      font-weight: 800;
      fill: #fff;
    }

    .node-kind {
      font-size: 12px;
      font-weight: 700;
      fill: rgba(255, 255, 255, 0.88);
    }

    .node-desc {
      font-size: 11px;
      fill: rgba(255, 255, 255, 0.88);
    }

    .cache .node-title,
    .cache .node-kind,
    .cache .node-desc {
      fill: #1f2937;
    }

    .edge {
      fill: none;
      stroke: #6b7280;
      stroke-width: 2;
      stroke-dasharray: 7 6;
    }

    .edge.planned {
      stroke-dasharray: 2 6;
    }

    .edge-label {
      fill: #4b5563;
      font-size: 10px;
      font-weight: 650;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 5px;
      stroke-linejoin: round;
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr));
      gap: 10px;
      padding: 14px 16px 16px;
      border-top: 1px solid var(--border);
      background: #fafbfc;
      color: #344055;
      font-size: 13px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }

    .swatch {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 2px solid rgba(0, 0, 0, 0.16);
      flex: 0 0 auto;
    }

    @media (max-width: 860px) {
      .legend {
        grid-template-columns: repeat(2, minmax(130px, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div>
        <h1>C4 Containerdiagram - SearchProject</h1>
        <p class="subtitle">
          Simpel C4-container-visning af den kørende søgeløsning: brugerflader, load balancer,
          SearchApi-replikaer, indexering, database, cache-retning og observability.
        </p>
      </div>
    </header>

    <section class="diagram-shell" aria-label="C4 containerdiagram">
      <svg id="diagram" viewBox="0 0 1200 760" role="img" aria-labelledby="diagramTitle diagramDesc">
        <title id="diagramTitle">C4 Containerdiagram for SearchProject</title>
        <desc id="diagramDesc">Bruger og klienter sender søgninger til SearchLoadBalancer, som router trafik til SearchApi. API læser fra Postgres og Redis, indexer skriver til Postgres, og logs sendes til Loki/Grafana.</desc>
        <defs>
          <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
            <path d="M 0 0 L 12 6 L 0 12 z" fill="#6b7280"></path>
          </marker>
        </defs>
      </svg>
      <div class="legend" aria-label="C4 legend">
        <div class="legend-item"><span class="swatch" style="background:#08427b"></span><span>Person</span></div>
        <div class="legend-item"><span class="swatch" style="background:#438dd5"></span><span>Container</span></div>
        <div class="legend-item"><span class="swatch" style="background:#2d8c7b"></span><span>Database</span></div>
        <div class="legend-item"><span class="swatch" style="background:#f6c85f;border-style:dashed"></span><span>Cache / v2</span></div>
        <div class="legend-item"><span class="swatch" style="background:#657184"></span><span>Observability</span></div>
      </div>
    </section>
  </div>

  <script>
    const boundary = {
      id: "searchproject",
      title: "SearchProject v2 [Software System]",
      x: 245,
      y: 70,
      w: 890,
      h: 600
    };

    const nodes = [
      {
        id: "user",
        type: "person",
        title: "Bruger",
        kind: "Person",
        desc: ["Søger i tekstfiler", "og ser demo/drift"],
        x: 60,
        y: 120,
        w: 150,
        h: 150
      },
      {
        id: "web",
        type: "container",
        title: "SearchWebApp",
        kind: "Container: Blazor",
        desc: ["Browserbaseret UI", "sender søgninger"],
        x: 310,
        y: 135,
        w: 180,
        h: 105
      },
      {
        id: "console",
        type: "container",
        title: "ConsoleSearch",
        kind: "Container: .NET CLI",
        desc: ["Console-klient", "sender søgninger"],
        x: 310,
        y: 345,
        w: 180,
        h: 105
      },
      {
        id: "lb",
        type: "container",
        title: "SearchLoadBalancer",
        kind: "Container: ASP.NET Core",
        desc: ["Round-robin/failover", "router requests"],
        x: 560,
        y: 240,
        w: 190,
        h: 115
      },
      {
        id: "api",
        type: "container",
        title: "SearchApi",
        kind: "Container: ASP.NET Core",
        desc: ["2 stateless replikaer", "søgelogik"],
        x: 825,
        y: 240,
        w: 190,
        h: 115
      },
      {
        id: "cache",
        type: "cache",
        title: "Redis cache",
        kind: "Container: Redis",
        desc: ["Planlagt v2", "hot query cache"],
        x: 825,
        y: 405,
        w: 190,
        h: 95
      },
      {
        id: "db",
        type: "database",
        title: "Postgres searchdb",
        kind: "Container: PostgreSQL",
        desc: ["word, document", "Occ reverse index"],
        x: 560,
        y: 505,
        w: 190,
        h: 110
      },
      {
        id: "indexer",
        type: "container",
        title: "indexer",
        kind: "Container: .NET job",
        desc: ["Crawler .txt filer", "skriver reverse index"],
        x: 310,
        y: 520,
        w: 180,
        h: 95
      },
      {
        id: "observability",
        type: "ops",
        title: "Loki + Grafana",
        kind: "Container: Observability",
        desc: ["Lagrer logs", "viser dashboards"],
        x: 825,
        y: 535,
        w: 190,
        h: 95
      }
    ];

    const edges = [
      {
        from: "user",
        to: "web",
        label: ["Uses", "[Browser/HTTP]"],
        points: [{ x: 210, y: 184 }, { x: 310, y: 184 }],
        labelAt: { x: 260, y: 154 }
      },
      {
        from: "user",
        to: "console",
        label: ["Uses", "[CLI]"],
        points: [{ x: 210, y: 226 }, { x: 250, y: 226 }, { x: 250, y: 398 }, { x: 310, y: 398 }],
        labelAt: { x: 250, y: 270 }
      },
      {
        from: "web",
        to: "lb",
        label: ["Sends search", "[POST /api/search]"],
        points: [{ x: 490, y: 188 }, { x: 525, y: 188 }, { x: 525, y: 276 }, { x: 560, y: 276 }],
        labelAt: { x: 525, y: 218 }
      },
      {
        from: "console",
        to: "lb",
        label: ["Sends search", "[POST /api/search]"],
        points: [{ x: 490, y: 398 }, { x: 525, y: 398 }, { x: 525, y: 320 }, { x: 560, y: 320 }],
        labelAt: { x: 525, y: 372 }
      },
      {
        from: "lb",
        to: "api",
        label: ["Routes request", "[round-robin/failover]"],
        points: [{ x: 750, y: 298 }, { x: 825, y: 298 }],
        labelAt: { x: 787, y: 270 }
      },
      {
        from: "api",
        to: "cache",
        label: ["Reads/writes", "[cached results]"],
        points: [{ x: 920, y: 355 }, { x: 920, y: 405 }],
        labelAt: { x: 980, y: 382 },
        planned: true
      },
      {
        from: "api",
        to: "db",
        label: ["Reads", "[reverse index]"],
        points: [{ x: 825, y: 322 }, { x: 785, y: 322 }, { x: 785, y: 560 }, { x: 750, y: 560 }],
        labelAt: { x: 785, y: 442 }
      },
      {
        from: "indexer",
        to: "db",
        label: ["Writes", "[reverse index]"],
        points: [{ x: 490, y: 568 }, { x: 560, y: 568 }],
        labelAt: { x: 525, y: 542 }
      },
      {
        from: "api",
        to: "observability",
        label: ["Logs", "[NLog]"],
        points: [{ x: 1015, y: 298 }, { x: 1050, y: 298 }, { x: 1050, y: 582 }, { x: 1015, y: 582 }],
        labelAt: { x: 1050, y: 445 }
      }
    ];

    function nodeById(id) {
      return nodes.find((node) => node.id === id);
    }

    function center(node) {
      return { x: node.x + node.w / 2, y: node.y + node.h / 2 };
    }

    function edgePoint(from, to) {
      const a = center(from);
      const b = center(to);
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const absDx = Math.abs(dx);
      const absDy = Math.abs(dy);

      if (absDx / from.w > absDy / from.h) {
        return {
          x: a.x + Math.sign(dx) * from.w / 2,
          y: a.y + dy * (from.w / 2) / Math.max(absDx, 1)
        };
      }

      return {
        x: a.x + dx * (from.h / 2) / Math.max(absDy, 1),
        y: a.y + Math.sign(dy) * from.h / 2
      };
    }

    function curvePath(from, to, bend = 0) {
      const start = edgePoint(from, to);
      const end = edgePoint(to, from);
      const mx = (start.x + end.x) / 2;
      const my = (start.y + end.y) / 2;
      const dx = end.x - start.x;
      const dy = end.y - start.y;
      const len = Math.hypot(dx, dy) || 1;
      const nx = -dy / len;
      const ny = dx / len;
      const cx = mx + nx * bend;
      const cy = my + ny * bend;

      return {
        d: `M ${start.x} ${start.y} Q ${cx} ${cy} ${end.x} ${end.y}`,
        label: { x: (mx + cx) / 2, y: (my + cy) / 2 }
      };
    }

    function routePath(points) {
      return points
        .map((point, index) => `${index === 0 ? "M" : "L"} ${point.x} ${point.y}`)
        .join(" ");
    }

    function svgEl(name, attrs = {}) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", name);
      Object.entries(attrs).forEach(([key, value]) => el.setAttribute(key, value));
      return el;
    }

    function addText(group, text, x, y, className, maxChars = 24) {
      const lines = Array.isArray(text) ? text : [text];
      const lineHeight = className === "node-title" ? 17 : 14;
      const baseY = y - ((lines.length - 1) * lineHeight) / 2;

      lines.forEach((line, index) => {
        const t = svgEl("text", {
          x,
          y: baseY + index * lineHeight,
          class: className
        });
        t.textContent = line.length > maxChars ? `${line.slice(0, maxChars - 1)}…` : line;
        group.appendChild(t);
      });
    }

    function addEdgeLabel(group, label, x, y) {
      const lines = Array.isArray(label) ? label : [label];
      const lineHeight = 13;
      const baseY = y - ((lines.length - 1) * lineHeight) / 2;

      lines.forEach((line, index) => {
        const t = svgEl("text", {
          x,
          y: baseY + index * lineHeight,
          class: "edge-label"
        });
        t.textContent = line;
        group.appendChild(t);
      });
    }

    function renderDiagram() {
      const svg = document.getElementById("diagram");
      const boundaryLayer = svgEl("g", { id: "boundaryLayer" });
      const edgeLayer = svgEl("g", { id: "edgeLayer" });
      const nodeLayer = svgEl("g", { id: "nodeLayer" });

      const boundaryGroup = svgEl("g", { id: boundary.id });
      boundaryGroup.appendChild(svgEl("rect", {
        x: boundary.x,
        y: boundary.y,
        width: boundary.w,
        height: boundary.h,
        class: "system-boundary"
      }));
      const boundaryTitle = svgEl("text", {
        x: boundary.x + 18,
        y: boundary.y + 24,
        class: "boundary-title"
      });
      boundaryTitle.textContent = boundary.title;
      boundaryGroup.appendChild(boundaryTitle);
      boundaryLayer.appendChild(boundaryGroup);

      edges.forEach((edge) => {
        const from = nodeById(edge.from);
        const to = nodeById(edge.to);
        const route = edge.points
          ? { d: routePath(edge.points), label: edge.labelAt }
          : curvePath(from, to, edge.bend);
        const path = svgEl("path", {
          d: route.d,
          class: edge.planned ? "edge planned" : "edge",
          markerEnd: "url(#arrow)"
        });
        edgeLayer.appendChild(path);

        addEdgeLabel(edgeLayer, edge.label, route.label.x, route.label.y);
      });

      nodes.forEach((node) => {
        const group = svgEl("g", { class: `node ${node.type}`, id: node.id });
        if (node.type === "person") {
          group.appendChild(svgEl("circle", {
            cx: node.x + node.w / 2,
            cy: node.y + 23,
            r: 22,
            class: "person-head"
          }));
          group.appendChild(svgEl("rect", {
            x: node.x,
            y: node.y + 42,
            width: node.w,
            height: node.h - 42,
            rx: 12,
            ry: 12,
            class: "person-body"
          }));
        } else {
          group.appendChild(svgEl("rect", {
            x: node.x,
            y: node.y,
            width: node.w,
            height: node.h,
            class: "node-rect"
          }));
        }

        const cx = node.x + node.w / 2;
        const titleY = node.type === "person" ? node.y + 73 : node.y + 28;
        addText(group, node.title, cx, titleY, "node-title", 25);
        addText(group, `[${node.kind}]`, cx, titleY + 24, "node-kind", 30);
        addText(group, node.desc, cx, titleY + 55, "node-desc", 30);
        nodeLayer.appendChild(group);
      });

      svg.appendChild(boundaryLayer);
      svg.appendChild(edgeLayer);
      svg.appendChild(nodeLayer);
    }
    renderDiagram();
  </script>
</body>
</html>
