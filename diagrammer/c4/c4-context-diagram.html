<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>C4 Contextdiagram - SearchProject</title>
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="10" fill="%23172033"/><rect x="8" y="10" width="48" height="14" rx="3" fill="%231168bd"/><rect x="8" y="30" width="22" height="24" rx="3" fill="%2308427b"/><rect x="34" y="30" width="22" height="24" rx="3" fill="%23999999"/></svg>'>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fa;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #5a6476;
      --border: #dbe1ea;
      --line: #636b79;
      --boundary: #2f3746;
      --person: #08427b;
      --person-stroke: #073763;
      --system: #1168bd;
      --system-stroke: #0b4884;
      --external: #999999;
      --external-stroke: #7f7f7f;
      --internal: #2f8e89;
      --internal-stroke: #1d6c68;
      --shadow: 0 18px 42px rgba(23, 32, 51, 0.11);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
    }

    .page {
      width: min(1360px, calc(100vw - 30px));
      margin: 0 auto;
      padding: 28px 0 34px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(26px, 3vw, 40px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0 0 16px;
      max-width: 960px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .diagram-shell {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: auto;
    }

    svg {
      display: block;
      width: 100%;
      min-width: 1140px;
      height: auto;
      background: #fff;
    }

    .system-boundary {
      fill: #fbfdff;
      stroke: var(--boundary);
      stroke-width: 1.8;
      stroke-dasharray: 8 6;
      rx: 18;
      ry: 18;
    }

    .boundary-title {
      fill: #2b3446;
      font-size: 16px;
      font-weight: 700;
    }

    .node-rect {
      stroke-width: 2;
      rx: 10;
      ry: 10;
      filter: drop-shadow(0 8px 14px rgba(23, 32, 51, 0.10));
    }

    .person-head,
    .person-body {
      fill: var(--person);
      stroke: var(--person-stroke);
      stroke-width: 2;
      filter: drop-shadow(0 8px 14px rgba(23, 32, 51, 0.10));
    }

    .system .node-rect {
      fill: var(--system);
      stroke: var(--system-stroke);
    }

    .external .node-rect {
      fill: var(--external);
      stroke: var(--external-stroke);
    }

    .internal .node-rect {
      fill: var(--internal);
      stroke: var(--internal-stroke);
    }

    .node-title,
    .node-kind,
    .node-desc {
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
      fill: #fff;
    }

    .node-title {
      font-size: 16px;
      font-weight: 800;
    }

    .node-kind {
      font-size: 12px;
      font-weight: 700;
      fill: rgba(255, 255, 255, 0.92);
    }

    .node-desc {
      font-size: 11px;
      fill: rgba(255, 255, 255, 0.9);
    }

    .edge {
      fill: none;
      stroke: var(--line);
      stroke-width: 2;
      stroke-dasharray: 7 6;
    }

    .edge-label {
      fill: #495162;
      font-size: 10px;
      font-weight: 650;
      text-anchor: middle;
      dominant-baseline: middle;
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 5px;
      stroke-linejoin: round;
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 10px;
      padding: 12px 16px 16px;
      border-top: 1px solid var(--border);
      background: #fafbfc;
      color: #344055;
      font-size: 13px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .swatch {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 2px solid rgba(0, 0, 0, 0.16);
      flex: 0 0 auto;
    }

    @media (max-width: 860px) {
      .legend {
        grid-template-columns: repeat(2, minmax(150px, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>C4 Contextdiagram - SearchProject</h1>
    <p class="subtitle">
      Overblik over SearchProject som samlet system med MitID-loginflow og observability:
      NLog/Loki er ejet internt, mens Prometheus/Grafana er eksterne platforme omkring systemet.
    </p>

    <section class="diagram-shell" aria-label="C4 contextdiagram">
      <svg id="diagram" viewBox="0 0 1360 860" role="img" aria-labelledby="diagramTitle diagramDesc">
        <title id="diagramTitle">C4 Contextdiagram for SearchProject</title>
        <desc id="diagramDesc">Slutbruger bruger SearchProject. Login går via privat MitID broker til MitID og tilbage med token. SearchProject sender logs til intern NLog/Loki. Prometheus scraper metrics, og Grafana læser fra Prometheus og Loki.</desc>
        <defs>
          <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
            <path d="M 0 0 L 12 6 L 0 12 z" fill="#636b79"></path>
          </marker>
        </defs>
      </svg>
      <div class="legend" aria-label="Legend">
        <div class="legend-item"><span class="swatch" style="background:#08427b"></span><span>Person</span></div>
        <div class="legend-item"><span class="swatch" style="background:#1168bd"></span><span>Software System</span></div>
        <div class="legend-item"><span class="swatch" style="background:#999999"></span><span>External System</span></div>
        <div class="legend-item"><span class="swatch" style="background:#2f8e89"></span><span>Intern platform</span></div>
      </div>
    </section>
  </div>

  <script>
    const boundary = {
      id: "searchprojectScope",
      title: "SearchProject v2 [System Boundary]",
      x: 300,
      y: 140,
      w: 760,
      h: 590
    };

    const nodes = [
      {
        id: "user",
        type: "person",
        title: "Slutbruger",
        kind: "Person",
        desc: ["Logger ind og søger", "i dokumenter"],
        x: 60,
        y: 300,
        w: 170,
        h: 170
      },
      {
        id: "searchproject",
        type: "system",
        title: "SearchProject",
        kind: "Software System",
        desc: ["Søgemaskine med UI/API", "til intern brug"],
        x: 515,
        y: 320,
        w: 330,
        h: 180
      },
      {
        id: "nlogLoki",
        type: "internal",
        title: "NLog + Loki",
        kind: "Intern observability",
        desc: ["Opsamler applikationslogs", "inde i projektets scope"],
        x: 585,
        y: 570,
        w: 190,
        h: 110
      },
      {
        id: "broker",
        type: "external",
        title: "Privat MitID Broker",
        kind: "External System",
        desc: ["OIDC/SAML-bro", "mellem SearchProject og MitID"],
        x: 430,
        y: 20,
        w: 220,
        h: 95
      },
      {
        id: "mitid",
        type: "external",
        title: "MitID",
        kind: "External System",
        desc: ["Identitetsvalidering", "og autentifikation"],
        x: 740,
        y: 20,
        w: 220,
        h: 95
      },
      {
        id: "prometheus",
        type: "external",
        title: "Prometheus",
        kind: "External System",
        desc: ["Scraper metrics", "fra SearchProject"],
        x: 1120,
        y: 300,
        w: 200,
        h: 105
      },
      {
        id: "grafana",
        type: "external",
        title: "Grafana",
        kind: "External System",
        desc: ["Dashboard og log-visning", "for driftsteam"],
        x: 1120,
        y: 520,
        w: 200,
        h: 105
      }
    ];

    const edges = [
      {
        from: "user",
        to: "searchproject",
        label: ["Bruger systemet", "[session efter login]"],
        points: [{ x: 230, y: 385 }, { x: 515, y: 385 }],
        labelAt: { x: 372, y: 358 }
      },
      {
        from: "searchproject",
        to: "broker",
        label: ["Starter login", "[redirect/OIDC start]"],
        points: [{ x: 610, y: 320 }, { x: 610, y: 230 }, { x: 530, y: 230 }, { x: 530, y: 115 }],
        labelAt: { x: 567, y: 208 }
      },
      {
        from: "broker",
        to: "mitid",
        label: ["Validerer bruger", "[MitID flow]"],
        points: [{ x: 650, y: 68 }, { x: 740, y: 68 }],
        labelAt: { x: 695, y: 44 }
      },
      {
        from: "broker",
        to: "searchproject",
        label: ["Returnerer claims/token", "[session etableres]"],
        points: [{ x: 650, y: 115 }, { x: 650, y: 200 }, { x: 760, y: 200 }, { x: 760, y: 320 }],
        labelAt: { x: 713, y: 176 }
      },
      {
        from: "searchproject",
        to: "prometheus",
        label: ["Eksponerer metrics", "[/metrics scrape]"],
        points: [{ x: 845, y: 380 }, { x: 1005, y: 380 }, { x: 1005, y: 350 }, { x: 1120, y: 350 }],
        labelAt: { x: 1008, y: 362 }
      },
      {
        from: "searchproject",
        to: "nlogLoki",
        label: ["Skriver logs", "[NLog pipeline]"],
        points: [{ x: 680, y: 500 }, { x: 680, y: 570 }],
        labelAt: { x: 730, y: 534 }
      },
      {
        from: "grafana",
        to: "prometheus",
        label: ["Læser metrics", "[PromQL]"],
        points: [{ x: 1220, y: 520 }, { x: 1220, y: 405 }],
        labelAt: { x: 1270, y: 464 }
      },
      {
        from: "grafana",
        to: "nlogLoki",
        label: ["Læser logs", "[LogQL]"],
        points: [{ x: 1120, y: 574 }, { x: 965, y: 574 }, { x: 965, y: 625 }, { x: 775, y: 625 }],
        labelAt: { x: 965, y: 606 }
      }
    ];

    function nodeById(id) {
      return nodes.find((node) => node.id === id);
    }

    function svgEl(name, attrs = {}) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", name);
      Object.entries(attrs).forEach(([key, value]) => el.setAttribute(key, value));
      return el;
    }

    function addText(group, text, x, y, className, maxChars = 30) {
      const lines = Array.isArray(text) ? text : [text];
      const lineHeight = className === "node-title" ? 17 : 14;
      const baseY = y - ((lines.length - 1) * lineHeight) / 2;

      lines.forEach((line, index) => {
        const t = svgEl("text", {
          x,
          y: baseY + index * lineHeight,
          class: className
        });
        t.textContent = line.length > maxChars ? `${line.slice(0, maxChars - 1)}…` : line;
        group.appendChild(t);
      });
    }

    function addEdgeLabel(group, label, x, y) {
      const lines = Array.isArray(label) ? label : [label];
      const lineHeight = 13;
      const baseY = y - ((lines.length - 1) * lineHeight) / 2;

      lines.forEach((line, index) => {
        const t = svgEl("text", {
          x,
          y: baseY + index * lineHeight,
          class: "edge-label"
        });
        t.textContent = line;
        group.appendChild(t);
      });
    }

    function routePath(points) {
      return points
        .map((point, index) => `${index === 0 ? "M" : "L"} ${point.x} ${point.y}`)
        .join(" ");
    }

    function renderDiagram() {
      const svg = document.getElementById("diagram");
      const boundaryLayer = svgEl("g", { id: "boundaryLayer" });
      const edgeLayer = svgEl("g", { id: "edgeLayer" });
      const nodeLayer = svgEl("g", { id: "nodeLayer" });

      const boundaryGroup = svgEl("g", { id: boundary.id });
      boundaryGroup.appendChild(svgEl("rect", {
        x: boundary.x,
        y: boundary.y,
        width: boundary.w,
        height: boundary.h,
        class: "system-boundary"
      }));

      const boundaryTitle = svgEl("text", {
        x: boundary.x + 18,
        y: boundary.y + 26,
        class: "boundary-title"
      });
      boundaryTitle.textContent = boundary.title;
      boundaryGroup.appendChild(boundaryTitle);
      boundaryLayer.appendChild(boundaryGroup);

      edges.forEach((edge) => {
        const from = nodeById(edge.from);
        const to = nodeById(edge.to);
        if (!from || !to) return;

        const path = svgEl("path", {
          d: routePath(edge.points),
          class: "edge",
          markerEnd: "url(#arrow)"
        });
        edgeLayer.appendChild(path);
        addEdgeLabel(edgeLayer, edge.label, edge.labelAt.x, edge.labelAt.y);
      });

      nodes.forEach((node) => {
        const group = svgEl("g", { class: `node ${node.type}`, id: node.id });

        if (node.type === "person") {
          group.appendChild(svgEl("circle", {
            cx: node.x + node.w / 2,
            cy: node.y + 24,
            r: 22,
            class: "person-head"
          }));
          group.appendChild(svgEl("rect", {
            x: node.x,
            y: node.y + 42,
            width: node.w,
            height: node.h - 42,
            rx: 12,
            ry: 12,
            class: "person-body"
          }));
        } else {
          group.appendChild(svgEl("rect", {
            x: node.x,
            y: node.y,
            width: node.w,
            height: node.h,
            class: "node-rect"
          }));
        }

        const cx = node.x + node.w / 2;
        const titleY = node.type === "person" ? node.y + 74 : node.y + 32;
        addText(group, node.title, cx, titleY, "node-title", 28);
        addText(group, `[${node.kind}]`, cx, titleY + 24, "node-kind", 33);
        addText(group, node.desc, cx, titleY + 57, "node-desc", 33);
        nodeLayer.appendChild(group);
      });

      svg.appendChild(boundaryLayer);
      svg.appendChild(edgeLayer);
      svg.appendChild(nodeLayer);
    }

    renderDiagram();
  </script>
</body>
</html>
