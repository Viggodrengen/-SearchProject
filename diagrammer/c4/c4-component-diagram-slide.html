<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>C4 Component Diagram - SearchWebApp</title>
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="10" fill="%23222"/><rect x="9" y="10" width="46" height="16" rx="3" fill="%237eaedf"/><rect x="9" y="32" width="22" height="22" rx="3" fill="%234a90d6"/><rect x="35" y="32" width="20" height="22" rx="3" fill="%236aa84f"/></svg>'>
  <style>
    :root {
      --bg: #eceff3;
      --title: #6aa84f;
      --ink: #1f2937;
      --muted: #4b5563;
      --line: #7b8290;
      --blue-box: #7eaedf;
      --blue-box-stroke: #6f9fce;
      --legend-container: #3a7fc8;
      --legend-component: #7eaedf;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #dfe5eb;
      padding: 16px;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--ink);
    }

    .slide {
      width: min(1500px, calc(100vw - 32px));
      aspect-ratio: 16 / 9;
      background: var(--bg);
      border: 1px solid #ccd4dd;
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.10);
      overflow: hidden;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .headline {
      fill: var(--title);
      font-size: 66px;
      font-weight: 760;
    }

    .caption {
      fill: #222;
      font-size: 36px;
      font-weight: 700;
    }

    .boundary {
      fill: none;
      stroke: #7f7f7f;
      stroke-width: 3;
      stroke-dasharray: 14 12;
    }

    .boundary-title {
      fill: #2a2a2a;
      font-size: 42px;
      font-weight: 760;
      text-anchor: middle;
    }

    .boundary-kind {
      fill: #424242;
      font-size: 30px;
      font-weight: 620;
      text-anchor: middle;
    }

    .box {
      fill: var(--blue-box);
      stroke: var(--blue-box-stroke);
      stroke-width: 2;
      rx: 3;
      ry: 3;
    }

    .db {
      fill: #4a90d6;
      stroke: #3a7fc8;
      stroke-width: 2;
    }

    .box-title {
      fill: #111827;
      font-size: 45px;
      font-weight: 760;
      text-anchor: middle;
    }

    .box-kind {
      fill: #1f2937;
      font-size: 30px;
      font-style: italic;
      font-weight: 550;
      text-anchor: middle;
    }

    .box-desc {
      fill: #111827;
      font-size: 34px;
      font-weight: 520;
      text-anchor: middle;
    }

    .db-title,
    .db-kind,
    .db-desc {
      fill: #f8fafc;
      text-anchor: middle;
    }

    .db-title {
      font-size: 44px;
      font-weight: 760;
    }

    .db-kind {
      font-size: 30px;
      font-style: italic;
      font-weight: 560;
    }

    .db-desc {
      font-size: 34px;
      font-weight: 520;
    }

    .rel {
      fill: none;
      stroke: var(--line);
      stroke-width: 3;
      marker-end: url(#arrow);
    }

    .rel-label {
      fill: #4b5563;
      font-size: 30px;
      font-weight: 600;
      text-anchor: middle;
    }

    .legend-title {
      fill: #222;
      font-size: 34px;
      font-weight: 700;
    }

    .legend-text {
      fill: #1f2937;
      font-size: 32px;
      font-weight: 520;
    }
  </style>
</head>
<body>
  <main class="slide" aria-label="C4 component diagram slide">
    <svg viewBox="0 0 2400 1350" role="img" aria-labelledby="ttl dsc">
      <title id="ttl">C4 Component Diagram for SearchWebApp</title>
      <desc id="dsc">Klassisk C4 component-diagram i minimal stil for SearchWebApp containeren.</desc>
      <defs>
        <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
          <path d="M0 0 L14 7 L0 14 z" fill="#7b8290"></path>
        </marker>
      </defs>

      <text class="headline" x="80" y="100">C4 - Component Diagram</text>
      <text class="caption" x="300" y="190">C4 - Component: SearchWebApp (minimal)</text>

      <rect class="box" x="1080" y="220" width="430" height="170"></rect>
      <text class="box-title" x="1295" y="285">Frontend</text>
      <text class="box-kind" x="1295" y="328">[Browser]</text>
      <text class="box-desc" x="1295" y="365">Bruger interagerer med UI</text>

      <rect class="boundary" x="60" y="520" width="1780" height="700"></rect>
      <text class="boundary-title" x="950" y="560">SearchWebApp (Blazor Server)</text>
      <text class="boundary-kind" x="950" y="600">[container]</text>

      <rect class="box" x="1060" y="640" width="470" height="200"></rect>
      <text class="box-title" x="1295" y="710">Home Page</text>
      <text class="box-kind" x="1295" y="756">[Pages/Home.razor]</text>
      <text class="box-desc" x="1295" y="808">HTTP-endpoint kald via klient</text>

      <rect class="box" x="660" y="930" width="520" height="210"></rect>
      <text class="box-title" x="920" y="1000">App Shell</text>
      <text class="box-kind" x="920" y="1046">[App.razor + Routes + Layout]</text>
      <text class="box-desc" x="920" y="1096">Routing, layout, render mode</text>

      <rect class="box" x="1240" y="930" width="520" height="210"></rect>
      <text class="box-title" x="1500" y="1000">SearchApiClient</text>
      <text class="box-kind" x="1500" y="1046">[Services/SearchApiClient.cs]</text>
      <text class="box-desc" x="1500" y="1096">POST /api/search + headers</text>

      <rect class="box" x="1820" y="930" width="500" height="210"></rect>
      <text class="box-title" x="2070" y="1000">HttpClient + Circuit</text>
      <text class="box-kind" x="2070" y="1046">[Program.cs + blazor.web.js]</text>
      <text class="box-desc" x="2070" y="1096">BaseUrl + realtime session</text>

      <path class="rel" d="M1295 390 L1295 640"></path>
      <text class="rel-label" x="1430" y="530">HTTP/HTTPS</text>
      <text class="rel-label" x="1430" y="568">[JSON]</text>

      <path class="rel" d="M1180 840 L1040 930"></path>
      <text class="rel-label" x="1080" y="885">renderer</text>
      <text class="rel-label" x="1080" y="920">[in-proc]</text>

      <path class="rel" d="M1330 840 L1450 930"></path>
      <text class="rel-label" x="1400" y="885">kalder</text>
      <text class="rel-label" x="1400" y="920">[in-proc]</text>

      <path class="rel" d="M1760 1035 L1820 1035"></path>
      <text class="rel-label" x="1790" y="1000">bruger</text>
      <text class="rel-label" x="1790" y="1030">[in-proc]</text>

      <ellipse class="db" cx="1500" cy="1230" rx="250" ry="30"></ellipse>
      <rect class="db" x="1250" y="1230" width="500" height="82"></rect>
      <ellipse class="db" cx="1500" cy="1312" rx="250" ry="30"></ellipse>
      <text class="db-title" x="1500" y="1266">Search LB</text>
      <text class="db-kind" x="1500" y="1294">[SearchLoadBalancer]</text>
      <text class="db-desc" x="1500" y="1330">/api/search endpoint</text>

      <path class="rel" d="M1500 1140 L1500 1196"></path>
      <text class="rel-label" x="1598" y="1170">HTTP POST</text>
      <text class="rel-label" x="1598" y="1204">[JSON]</text>

      <text class="legend-title" x="1960" y="1210">Legend</text>
      <rect x="1960" y="1224" width="280" height="32" fill="var(--legend-container)"></rect>
      <text class="legend-text" x="1976" y="1249">container</text>
      <rect x="1960" y="1262" width="280" height="32" fill="var(--legend-component)"></rect>
      <text class="legend-text" x="1976" y="1287">component</text>
      <rect x="1960" y="1300" width="22" height="22" fill="none" stroke="#7f7f7f" stroke-width="3"></rect>
      <text class="legend-text" x="1998" y="1322">container boundary</text>
    </svg>
  </main>
</body>
</html>
