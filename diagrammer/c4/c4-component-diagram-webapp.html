<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>C4 Componentdiagram - SearchServer</title>
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="10" fill="%23172033"/><rect x="11" y="11" width="42" height="14" rx="3" fill="%234f93d9"/><rect x="11" y="31" width="20" height="22" rx="3" fill="%232f78c3"/><rect x="35" y="31" width="18" height="22" rx="3" fill="%232f8e89"/></svg>'>
  <style>
    :root {
      --bg: #f4f6fa;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #556070;
      --border: #d5dce9;
      --line: #6b7280;
      --person: #0f4c8a;
      --component: #4f93d9;
      --core: #2f78c3;
      --adapter: #2f8e89;
      --external: #6a7689;
      --boundary: #2f3746;
      --shadow: 0 18px 45px rgba(23, 32, 51, 0.10);
      font-family: "Segoe UI", Tahoma, Verdana, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
    }

    .page {
      width: min(1360px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 26px 0 30px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(26px, 3vw, 40px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0 0 16px;
      color: var(--muted);
      max-width: 980px;
      font-size: 15px;
      line-height: 1.5;
    }

    .diagram-shell {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: auto;
    }

    svg {
      display: block;
      width: 100%;
      min-width: 1120px;
      height: auto;
      background: #fff;
    }

    .container-boundary {
      fill: #fff;
      stroke: var(--boundary);
      stroke-width: 1.8;
      stroke-dasharray: 8 6;
      rx: 18;
      ry: 18;
    }

    .boundary-title {
      fill: #2a3447;
      font-size: 16px;
      font-weight: 700;
    }

    .node-rect {
      stroke-width: 2;
      rx: 10;
      ry: 10;
      filter: drop-shadow(0 8px 14px rgba(23, 32, 51, 0.10));
    }

    .person-head,
    .person-body {
      fill: var(--person);
      stroke: #0c3f72;
      stroke-width: 2;
      filter: drop-shadow(0 8px 14px rgba(23, 32, 51, 0.10));
    }

    .component .node-rect {
      fill: var(--component);
      stroke: #2f72b3;
    }

    .core .node-rect {
      fill: var(--core);
      stroke: #1f5e9e;
    }

    .adapter .node-rect {
      fill: var(--adapter);
      stroke: #1d6c68;
    }

    .database .node-rect {
      fill: var(--data);
      stroke: #1d5e53;
    }

    .external .node-rect {
      fill: var(--external);
      stroke: #4c586a;
    }

    .node-title,
    .node-kind,
    .node-desc {
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
      fill: #fff;
    }

    .node-title {
      font-size: 15px;
      font-weight: 800;
    }

    .node-kind {
      font-size: 12px;
      font-weight: 700;
      fill: rgba(255, 255, 255, 0.92);
    }

    .node-desc {
      font-size: 11px;
      fill: rgba(255, 255, 255, 0.90);
    }

    .edge {
      fill: none;
      stroke: var(--line);
      stroke-width: 2;
      stroke-dasharray: 7 6;
    }

    .edge-label {
      fill: #4b5563;
      font-size: 10px;
      font-weight: 650;
      text-anchor: middle;
      dominant-baseline: middle;
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 5px;
      stroke-linejoin: round;
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr));
      gap: 10px;
      padding: 12px 16px 16px;
      border-top: 1px solid var(--border);
      background: #fafbfc;
      color: #344055;
      font-size: 13px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .swatch {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 2px solid rgba(0, 0, 0, 0.16);
      flex: 0 0 auto;
    }

    @media (max-width: 880px) {
      .legend {
        grid-template-columns: repeat(2, minmax(130px, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>C4 Componentdiagram - SearchServer</h1>
    <p class="subtitle">
      Minimal C4-komponentvisning med SearchController, central SearchService,
      DTO-mapping og DBRepository/Database i et klassisk backend-flow.
    </p>

    <section class="diagram-shell" aria-label="C4 componentdiagram">
      <svg id="diagram" viewBox="0 0 1280 790" role="img" aria-labelledby="diagramTitle diagramDesc">
        <title id="diagramTitle">C4 Componentdiagram for SearchServer container</title>
        <desc id="diagramDesc">Forenklet komponentdiagram for SearchServer med SearchPage udenfor containeren, SearchController, SearchService, DTO-mapping og DBRepository mod ekstern database.</desc>
        <defs>
          <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
            <path d="M 0 0 L 12 6 L 0 12 z" fill="#6b7280"></path>
          </marker>
        </defs>
      </svg>
      <div class="legend" aria-label="Legend">
        <div class="legend-item"><span class="swatch" style="background:#0f4c8a"></span><span>Person</span></div>
        <div class="legend-item"><span class="swatch" style="background:#6a7689"></span><span>Frontend (outside)</span></div>
        <div class="legend-item"><span class="swatch" style="background:#4f93d9"></span><span>Component</span></div>
        <div class="legend-item"><span class="swatch" style="background:#2f78c3"></span><span>Core component</span></div>
        <div class="legend-item"><span class="swatch" style="background:#2d8c7b"></span><span>Database</span></div>
      </div>
    </section>
  </div>

  <script>
    const boundary = {
      id: "searchserver",
      title: "SearchServer (ASP.NET Core) [Container]",
      x: 260,
      y: 180,
      w: 760,
      h: 430
    };

    const nodes = [
      {
        id: "user",
        type: "person",
        title: "Bruger",
        kind: "Person",
        desc: ["Skriver søgning", "ser resultater"],
        x: 50,
        y: 250,
        w: 160,
        h: 150
      },
      {
        id: "searchPage",
        type: "external",
        title: "SearchPage",
        kind: "Frontend component",
        desc: ["UI for søgning", "kalder backend"],
        x: 540,
        y: 45,
        w: 220,
        h: 88
      },
      {
        id: "searchController",
        type: "component",
        title: "SearchController",
        kind: "ASP.NET Core Controller",
        desc: ["HTTP-endpoints", "for søgeforespørgsler"],
        x: 620,
        y: 230,
        w: 200,
        h: 90
      },
      {
        id: "searchService",
        type: "core",
        title: "SearchService",
        kind: "Application service",
        desc: ["Forretningslogik", "orkestrerer kald"],
        x: 565,
        y: 355,
        w: 280,
        h: 105
      },
      {
        id: "validator",
        type: "component",
        title: "RequestValidator",
        kind: "Validation component",
        desc: ["Validerer query", "normaliserer input"],
        x: 315,
        y: 500,
        w: 185,
        h: 82
      },
      {
        id: "dbRepo",
        type: "component",
        title: "DBRepository",
        kind: "Data access component",
        desc: ["CRUD/læse-adgang", "til database"],
        x: 560,
        y: 500,
        w: 220,
        h: 82
      },
      {
        id: "mapper",
        type: "component",
        title: "DTO/Mappers",
        kind: "Mapping component",
        desc: ["Mapper respons", "til view model"],
        x: 815,
        y: 500,
        w: 175,
        h: 82
      },
      {
        id: "database",
        type: "database",
        title: "Database",
        kind: "PostgreSQL",
        desc: ["Vedvarende data", "søgning/index"],
        x: 605,
        y: 645,
        w: 160,
        h: 78
      }
    ];

    const edges = [
      {
        from: "user",
        to: "searchPage",
        label: ["Bruger UI", "[HTTPS/browser]"],
        points: [{ x: 210, y: 325 }, { x: 250, y: 325 }, { x: 250, y: 89 }, { x: 540, y: 89 }],
        labelAt: { x: 250, y: 204 }
      },
      {
        from: "searchPage",
        to: "searchController",
        label: ["HTTP/HTTPS", "[JSON]"],
        points: [{ x: 650, y: 133 }, { x: 650, y: 185 }, { x: 720, y: 185 }, { x: 720, y: 230 }],
        labelAt: { x: 650, y: 162 }
      },
      {
        from: "searchController",
        to: "searchService",
        label: ["Kalder", "[in-proc]"],
        points: [{ x: 720, y: 320 }, { x: 720, y: 355 }],
        labelAt: { x: 780, y: 338 }
      },
      {
        from: "searchController",
        to: "mapper",
        label: ["Mapper response", "[in-proc]"],
        points: [{ x: 820, y: 275 }, { x: 880, y: 275 }, { x: 880, y: 541 }, { x: 902, y: 541 }],
        labelAt: { x: 900, y: 430 }
      },
      {
        from: "searchService",
        to: "validator",
        label: ["Validerer", "[in-proc]"],
        points: [{ x: 565, y: 420 }, { x: 520, y: 420 }, { x: 520, y: 541 }, { x: 500, y: 541 }],
        labelAt: { x: 520, y: 488 }
      },
      {
        from: "searchService",
        to: "dbRepo",
        label: ["Henter/lagrer data", "[in-proc]"],
        points: [{ x: 705, y: 460 }, { x: 705, y: 500 }],
        labelAt: { x: 770, y: 480 }
      },
      {
        from: "searchService",
        to: "mapper",
        label: ["Mapper resultater", "[in-proc]"],
        points: [{ x: 845, y: 430 }, { x: 885, y: 500 }],
        labelAt: { x: 915, y: 468 }
      },
      {
        from: "dbRepo",
        to: "database",
        label: ["CRUD", "[TCP 5432/SQL]"],
        points: [{ x: 670, y: 582 }, { x: 670, y: 645 }],
        labelAt: { x: 758, y: 620 }
      }
    ];

    function routePath(points) {
      return points
        .map((point, index) => `${index === 0 ? "M" : "L"} ${point.x} ${point.y}`)
        .join(" ");
    }

    function svgEl(name, attrs = {}) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", name);
      Object.entries(attrs).forEach(([key, value]) => el.setAttribute(key, value));
      return el;
    }

    function addText(group, text, x, y, className, maxChars = 28) {
      const lines = Array.isArray(text) ? text : [text];
      const lineHeight = className === "node-title" ? 17 : 14;
      const baseY = y - ((lines.length - 1) * lineHeight) / 2;

      lines.forEach((line, index) => {
        const t = svgEl("text", {
          x,
          y: baseY + index * lineHeight,
          class: className
        });
        t.textContent = line.length > maxChars ? `${line.slice(0, maxChars - 1)}...` : line;
        group.appendChild(t);
      });
    }

    function addEdgeLabel(group, label, x, y) {
      const lines = Array.isArray(label) ? label : [label];
      const lineHeight = 12;
      const baseY = y - ((lines.length - 1) * lineHeight) / 2;

      lines.forEach((line, index) => {
        const t = svgEl("text", {
          x,
          y: baseY + index * lineHeight,
          class: "edge-label"
        });
        t.textContent = line;
        group.appendChild(t);
      });
    }

    function renderDiagram() {
      const svg = document.getElementById("diagram");
      const boundaryLayer = svgEl("g", { id: "boundaryLayer" });
      const edgeLayer = svgEl("g", { id: "edgeLayer" });
      const nodeLayer = svgEl("g", { id: "nodeLayer" });

      const boundaryGroup = svgEl("g", { id: boundary.id });
      boundaryGroup.appendChild(svgEl("rect", {
        x: boundary.x,
        y: boundary.y,
        width: boundary.w,
        height: boundary.h,
        class: "container-boundary"
      }));
      const boundaryTitle = svgEl("text", {
        x: boundary.x + 16,
        y: boundary.y + 28,
        class: "boundary-title"
      });
      boundaryTitle.textContent = boundary.title;
      boundaryGroup.appendChild(boundaryTitle);
      boundaryLayer.appendChild(boundaryGroup);

      edges.forEach((edge) => {
        const path = svgEl("path", {
          d: routePath(edge.points),
          class: "edge",
          markerEnd: "url(#arrow)"
        });
        edgeLayer.appendChild(path);
        addEdgeLabel(edgeLayer, edge.label, edge.labelAt.x, edge.labelAt.y);
      });

      nodes.forEach((node) => {
        const group = svgEl("g", { class: `node ${node.type}`, id: node.id });

        if (node.type === "person") {
          group.appendChild(svgEl("circle", {
            cx: node.x + node.w / 2,
            cy: node.y + 24,
            r: 22,
            class: "person-head"
          }));
          group.appendChild(svgEl("rect", {
            x: node.x,
            y: node.y + 44,
            width: node.w,
            height: node.h - 44,
            rx: 12,
            ry: 12,
            class: "person-body"
          }));
        } else {
          group.appendChild(svgEl("rect", {
            x: node.x,
            y: node.y,
            width: node.w,
            height: node.h,
            class: "node-rect"
          }));
        }

        const cx = node.x + node.w / 2;
        const titleY = node.type === "person" ? node.y + 76 : node.y + 24;
        addText(group, node.title, cx, titleY, "node-title", 29);
        addText(group, `[${node.kind}]`, cx, titleY + 21, "node-kind", 32);
        addText(group, node.desc, cx, titleY + 44, "node-desc", 34);
        nodeLayer.appendChild(group);
      });

      svg.appendChild(boundaryLayer);
      svg.appendChild(edgeLayer);
      svg.appendChild(nodeLayer);
    }

    renderDiagram();
  </script>
</body>
</html>
