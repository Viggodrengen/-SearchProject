services:
  postgres:
    image: postgres:16
    container_name: search-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: searchdb
      POSTGRES_USER: search
      POSTGRES_PASSWORD: search
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U search -d searchdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  loki:
    image: grafana/loki:3.5.0
    container_name: search-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3101:3100"

  grafana:
    image: grafana/grafana:12.1.1
    container_name: search-grafana
    restart: unless-stopped
    depends_on:
      - loki
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: search-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  redis:
    image: redis:7.4-alpine
    container_name: search-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  indexer:
    build:
      context: .
      dockerfile: indexer/Dockerfile
    container_name: search-indexer
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      INDEXER_NON_INTERACTIVE: "true"
      INDEXER_DATABASE: postgres
      INDEXER_FOLDER: /data/indexer
      INDEXER_EXTENSIONS: .txt
      INDEXER_TOP_WORDS: 10
      SEARCH_POSTGRES_CONNECTION: Host=postgres;Port=5432;Username=search;Password=search;Database=searchdb
      REDIS_CONNECTION_STRING: redis:6379,allowAdmin=true
    volumes:
      - ./docker/indexer-data:/data/indexer:ro

  searchapi1:
    build:
      context: .
      dockerfile: SearchApi/Dockerfile
    container_name: search-api-1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      loki:
        condition: service_started
      redis:
        condition: service_healthy
      indexer:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      SEARCH_INSTANCE_ID: search-api-1
      SEARCH_POSTGRES_CONNECTION: Host=postgres;Port=5432;Username=search;Password=search;Database=searchdb
      REDIS_CONNECTION_STRING: redis:6379
      SearchCache__Enabled: "true"
      SearchCache__TtlSeconds: 120
      LOKI_URL: http://loki:3100
      LOKI_APP: search-api
    ports:
      - "5017:8080"

  searchapi2:
    build:
      context: .
      dockerfile: SearchApi/Dockerfile
    container_name: search-api-2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      loki:
        condition: service_started
      redis:
        condition: service_healthy
      indexer:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      SEARCH_INSTANCE_ID: search-api-2
      SEARCH_POSTGRES_CONNECTION: Host=postgres;Port=5432;Username=search;Password=search;Database=searchdb
      REDIS_CONNECTION_STRING: redis:6379
      SearchCache__Enabled: "true"
      SearchCache__TtlSeconds: 120
      LOKI_URL: http://loki:3100
      LOKI_APP: search-api
    ports:
      - "5018:8080"

  searchloadbalancer:
    build:
      context: .
      dockerfile: SearchLoadBalancer/Dockerfile
    container_name: search-load-balancer
    restart: unless-stopped
    depends_on:
      - searchapi1
      - searchapi2
      - loki
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      LB_INSTANCE_ID: search-load-balancer-1
      LOKI_URL: http://loki:3100
      LOKI_APP: search-load-balancer
      LoadBalancer__Strategy: round-robin
      LoadBalancer__BackendTimeoutSeconds: 10
      LoadBalancer__Backends__0__Name: search-api-1
      LoadBalancer__Backends__0__BaseUrl: http://searchapi1:8080
      LoadBalancer__Backends__1__Name: search-api-2
      LoadBalancer__Backends__1__BaseUrl: http://searchapi2:8080
    ports:
      - "5075:8080"

  searchwebapp:
    build:
      context: .
      dockerfile: SearchWebApp/Dockerfile
    container_name: search-web-app
    restart: unless-stopped
    depends_on:
      - searchloadbalancer
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      SearchApi__BaseUrl: http://searchloadbalancer:8080
      UseHttpsRedirection: "false"
    ports:
      - "5249:8080"

volumes:
  postgres-data:
  grafana-data:
