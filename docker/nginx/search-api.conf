# Docker Compose equivalent of the Kubernetes Service/Ingress routing layer.
upstream search_api_backend {
    server search-api-1:8080;
    server search-api-2:8080;
}

server {
    listen 8080;

    location /api/ {
        proxy_pass http://search_api_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_next_upstream error timeout http_502 http_503 http_504;

        # Kept for the UI/test scripts so they can show which API replica handled a request.
        add_header X-LB-Strategy "nginx-round-robin" always;
        add_header X-LB-Backend $upstream_addr always;
    }
}
